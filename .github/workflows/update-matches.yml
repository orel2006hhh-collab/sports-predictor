name: Update Daily Matches

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-matches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Create matches.json
        run: |
          echo '{
            "lastUpdated": "'$(date -Iseconds)'",
            "matches": [
              {"sport": "nhl", "home": "Philadelphia Flyers", "away": "Carolina Hurricanes", "league": "НХЛ", "prob": 72, "winner": "Carolina Hurricanes", "date": "'$(date +%d.%m.%Y)'", "time": "02:00 МСК"},
              {"sport": "vhl", "home": "Югра", "away": "Нефтяник", "league": "ВХЛ", "prob": 78, "winner": "Югра", "date": "'$(date +%d.%m.%Y)'", "time": "19:00 МСК"},
              {"sport": "nba", "home": "Oklahoma City Thunder", "away": "Los Angeles Lakers", "league": "НБА", "prob": 72, "winner": "Oklahoma City Thunder", "date": "'$(date +%d.%m.%Y)'", "time": "05:30 МСК"},
              {"sport": "cricket", "home": "Gujarat Titans", "away": "Mumbai Indians", "league": "IPL", "prob": 68, "winner": "Gujarat Titans", "date": "'$(date +%d.%m.%Y)'", "time": "21:30 МСК"}
            ],
            "dateInfo": {"today": "'$(date +%d.%m.%Y)'", "tomorrow": "'$(date -d tomorrow +%d.%m.%Y)'"}
          }' > data/matches.json
      
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/matches.json
          git diff --cached --quiet || git commit -m "Автообновление матчей"
          git push
          - name: Install dependencies
  run: |
    pip install feedparser requests
