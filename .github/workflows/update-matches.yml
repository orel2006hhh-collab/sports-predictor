name: Update Daily Matches

on:
  schedule:
    # Запуск каждый день в 6:00 UTC (9:00 МСК)
    - cron: '0 6 * * *'
  # Возможность запуска вручную из интерфейса GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-matches:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Run update script
        run: python scripts/update_matches.py
      
      - name: Update index.html with new data
        run: |
          python scripts/update_index.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/matches.json data/matches_data.js
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Автообновление матчей [skip ci]"
          git push
