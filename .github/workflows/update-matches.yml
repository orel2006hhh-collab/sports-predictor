name: 🧠 AI Sports Predictor — полное автообновление (статистика + ИИ)

on:
  schedule:
    # Каждый день в 10:00 утра по Москве
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      manual_run:
        description: 'Принудительное обновление (True/False)'
        required: false
        default: 'True'

jobs:
  full-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Получение кода репозитория
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Установка Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Установка зависимостей
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. Запуск основного скрипта обновления (сравнение статистики + новые прогнозы + ИИ)
      - name: 🔄 Run full update (statistics + AI predictions)
        run: python scripts/update_matches.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      # 5. Фиксация изменений в Git
      - name: 💾 Commit and push updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "🤖 Автообновление матчей, статистики и ИИ-прогнозов [skip ci]"
          git push
