name: Update Daily Matches

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-matches:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Create data directory
        run: |
          mkdir -p data
          mkdir -p scripts
      
      - name: Run update script
        run: |
          python scripts/update_matches.py
        continue-on-error: false
      
      - name: Check for changes
        id: git-check
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/matches.json data/matches_data.js
          echo "changed=$(git diff --cached --name-only | wc -l)" >> $GITHUB_OUTPUT
      
      - name: Commit and push if changed
        if: steps.git-check.outputs.changed != '0'
        run: |
          git commit -m "🤖 Автообновление матчей [skip ci]"
          git push
