name: Update Match Data

on:
  schedule:
    # Запуск каждый день в 6 утра (UTC)
    - cron: '0 6 * * *'
  # Возможность запуска вручную из интерфейса GitHub
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Run update script
        run: python scripts/fetch_matches.py
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/matches.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Автоматическое обновление матчей [skip ci]"
          git push
