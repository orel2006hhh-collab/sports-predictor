name: Тест NBA API с заголовками

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install nba_api
        run: pip install nba_api pandas
      - name: Run test
        run: python test_nba_api_headers.py
