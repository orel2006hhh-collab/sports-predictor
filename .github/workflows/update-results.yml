name: Update Match Results

on:
  schedule:
    - cron: '30 9 * * *'
    - cron: '30 15 * * *'
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-results:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install feedparser
          pip install fs-football-fork
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Create empty history.json if not exists
        run: |
          if [ ! -f data/history.json ]; then
            echo '{"lastUpdated": "", "predictions": []}' > data/history.json
          fi
      
      - name: Run results script
        run: python scripts/get_results.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/history.json
          if git diff --cached --quiet; then
            echo "📭 Нет изменений для коммита"
          else
            git commit -m "📊 Автообновление результатов матчей [skip ci]"
            git push
          fi
