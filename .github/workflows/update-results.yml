name: Update Match Results

on:
  schedule:
    - cron: '30 5 * * *'  # Каждый день в 5:30 МСК
    - cron: '30 13 * * *' # Дополнительно в 13:30 МСК (для дневных матчей)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run results parser
        run: python scripts/parse_results.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/history.json
          git diff --cached --quiet || git commit -m "📊 Автообновление результатов матчей [skip ci]"
          git push
