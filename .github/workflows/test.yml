name: Тест API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install requests
        run: pip install requests
      - name: Run test
        run: python test_balldontlie.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
