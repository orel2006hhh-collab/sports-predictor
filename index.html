<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Betting Corp - Прогнозы</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a1a;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 10px; }
        .sub { text-align: center; color: #888; margin-bottom: 30px; }
        
        .sport-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .sport-btn {
            padding: 10px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            background: #1a1a2e;
            color: #eee;
        }
        .sport-btn.active {
            background: #2c6e4f;
        }
        
        .stats-panel {
            text-align: center;
            margin-bottom: 30px;
        }
        .stats-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: #2c6e4f;
            color: white;
            font-size: 1rem;
        }
        
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
            gap: 20px;
        }
        .match-card {
            background: #141428;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2c6e4f;
        }
        .match-date {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .team {
            text-align: center;
            flex: 1;
        }
        .team-name {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .vs {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c6e4f;
        }
        .prediction {
            background: #0a0a1a;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-top: 15px;
        }
        .winner {
            font-size: 1.3rem;
            font-weight: bold;
            color: #7ddf64;
        }
        .prob {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f5d742;
        }
        .total {
            color: #888;
            margin-top: 8px;
        }
        
        .stats-table {
            background: #141428;
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #2c6e4f;
        }
        th { color: #7ddf64; }
        .success { color: #7ddf64; }
        .failed { color: #e34c26; }
        
        .loading { text-align: center; padding: 50px; color: #888; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 AI Betting Corporation</h1>
    <div class="sub">Прогнозы на основе коэффициентов букмекеров</div>
    
    <div class="sport-buttons">
        <button class="sport-btn active" data-sport="nba">🏀 NBA</button>
        <button class="sport-btn" data-sport="nhl">🏒 NHL</button>
    </div>
    
    <div class="stats-panel">
        <button class="stats-btn" id="statsBtn">📊 Показать статистику</button>
    </div>
    
    <div id="matchesPanel">
        <div id="matchesContainer" class="match-grid">
            <div class="loading">Загрузка...</div>
        </div>
    </div>
    
    <div id="statsPanel" class="hidden">
        <div class="stats-table">
            <h3>📈 История прогнозов</h3>
            <div id="statsContainer"></div>
        </div>
    </div>
</div>

<script>
    let currentSport = 'nba';
    let showStats = false;
    
    async function loadData() {
        if (!showStats) {
            await loadMatches();
        } else {
            await loadStats();
        }
    }
    
    async function loadMatches() {
        const container = document.getElementById('matchesContainer');
        container.innerHTML = '<div class="loading">Загрузка...</div>';
        
        try {
            const response = await fetch(`data/${currentSport}_matches.json?t=${Date.now()}`);
            if (!response.ok) throw new Error('Нет данных');
            const data = await response.json();
            const matches = data.matches || [];
            
            if (matches.length === 0) {
                container.innerHTML = '<div class="loading">Нет предстоящих матчей</div>';
                return;
            }
            
            container.innerHTML = matches.map(m => `
                <div class="match-card">
                    <div class="match-date">📅 ${m.date} · ${m.time || '04:30 МСК'}</div>
                    <div class="teams">
                        <div class="team">
                            <div class="team-name">${m.home}</div>
                        </div>
                        <div class="vs">VS</div>
                        <div class="team">
                            <div class="team-name">${m.away}</div>
                        </div>
                    </div>
                    <div class="prediction">
                        <div class="winner">🎯 ${m.winner} победа</div>
                        <div class="prob">Вероятность ${m.prob}%</div>
                        <div class="total">📊 ${m.total_prediction}</div>
                    </div>
                    <div style="font-size: 0.7rem; color: #666; text-align: center; margin-top: 10px;">
                        Источник: ${m.data_source}
                    </div>
                </div>
            `).join('');
        } catch (error) {
            container.innerHTML = `<div class="loading">Ошибка: ${error.message}</div>`;
        }
    }
    
    async function loadStats() {
        const container = document.getElementById('statsContainer');
        container.innerHTML = '<div class="loading">Загрузка статистики...</div>';
        
        try {
            const response = await fetch(`data/${currentSport}_history.json?t=${Date.now()}`);
            if (!response.ok) throw new Error('Нет данных');
            const data = await response.json();
            const predictions = data.predictions || [];
            
            if (predictions.length === 0) {
                container.innerHTML = '<div class="loading">Нет завершённых матчей</div>';
                return;
            }
            
            // Подсчёт статистики
            let total = predictions.length;
            let wins = predictions.filter(p => p.result === '✅').length;
            let totalCorrect = predictions.filter(p => p.total_result === '✅').length;
            
            container.innerHTML = `
                <div style="display: flex; gap: 20px; margin-bottom: 25px;">
                    <div style="background: #0a0a1a; padding: 15px; border-radius: 15px; flex: 1; text-align: center;">
                        <div>🏆 Точность побед</div>
                        <div style="font-size: 2rem; font-weight: bold; color: #7ddf64;">${Math.round(wins/total*100)}%</div>
                        <div>✅ ${wins} / ❌ ${total - wins}</div>
                    </div>
                    <div style="background: #0a0a1a; padding: 15px; border-radius: 15px; flex: 1; text-align: center;">
                        <div>📊 Точность тотала</div>
                        <div style="font-size: 2rem; font-weight: bold; color: #7ddf64;">${Math.round(totalCorrect/total*100)}%</div>
                        <div>✅ ${totalCorrect} / ❌ ${total - totalCorrect}</div>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr><th>Дата</th><th>Матч</th><th>Прогноз</th><th>Результат</th><th>Тотал</th><th>Результат</th><th>Счёт</th><th>Вероятность</th></tr>
                    </thead>
                    <tbody>
                        ${predictions.map(p => `
                            <tr>
                                <td>${p.date}</td>
                                <td>${p.home} — ${p.away}</td>
                                <td>${p.prediction}</td>
                                <td class="${p.result === '✅' ? 'success' : 'failed'}">${p.result}</td>
                                <td>${p.total_prediction || '—'}</td>
                                <td class="${p.total_result === '✅' ? 'success' : 'failed'}">${p.total_result}</td>
                                <td>${p.actual_score || '—'}</td>
                                <td>${p.prob}%</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } catch (error) {
            container.innerHTML = `<div class="loading">Ошибка: ${error.message}</div>`;
        }
    }
    
    // Переключение спорта
    document.querySelectorAll('.sport-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSport = btn.dataset.sport;
            if (!showStats) {
                loadMatches();
            } else {
                loadStats();
            }
        };
    });
    
    // Переключение между прогнозами и статистикой
    document.getElementById('statsBtn').onclick = () => {
        showStats = !showStats;
        const matchesPanel = document.getElementById('matchesPanel');
        const statsPanel = document.getElementById('statsPanel');
        
        if (showStats) {
            matchesPanel.classList.add('hidden');
            statsPanel.classList.remove('hidden');
            document.getElementById('statsBtn').textContent = '🏠 Показать прогнозы';
            loadStats();
        } else {
            matchesPanel.classList.remove('hidden');
            statsPanel.classList.add('hidden');
            document.getElementById('statsBtn').textContent = '📊 Показать статистику';
            loadMatches();
        }
    };
    
    // Загружаем
    loadMatches();
</script>
</body>
</html>
