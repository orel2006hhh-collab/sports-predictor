<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA прогнозы | DeepSeek AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a1a;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(620px, 1fr));
            gap: 20px;
        }
        .match-card {
            background: #141428;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2c6e4f;
        }
        .match-date {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2c6e4f;
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .team {
            text-align: center;
            flex: 1;
        }
        .team-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .team-form {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .team-form .win { color: #7ddf64; }
        .team-form .loss { color: #e34c26; }
        .vs {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c6e4f;
            margin: 0 10px;
        }
        .odds-row {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 48px;
            padding: 12px 20px;
            margin: 15px 0 8px 0;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .odds-cell { flex: 1; }
        .odds-team {
            font-size: 0.7rem;
            color: #9bc4a8;
            margin-bottom: 5px;
        }
        .odds-num {
            font-size: 1.8rem;
            font-weight: 800;
            color: #f5d742;
        }
        .bookmakers-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 0.7rem;
            color: #9bc4a8;
            text-align: center;
        }
        .stats-row {
            background: #0a0a1a;
            border-radius: 12px;
            padding: 12px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .stat-block {
            flex: 1;
            text-align: center;
        }
        .stat-label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 0.9rem;
            font-weight: bold;
            color: #f5d742;
        }
        
        .ai-thinking {
            background: linear-gradient(135deg, rgba(0, 50, 80, 0.4), rgba(0, 30, 50, 0.3));
            border-left: 4px solid #4aa3cf;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
        }
        .ai-title {
            font-size: 0.75rem;
            color: #4aa3cf;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .ai-text {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #cce;
        }
        
        .prediction {
            background: linear-gradient(135deg, #1a3a2a, #0a1a0a);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            margin-top: 15px;
        }
        .winner {
            font-size: 1.2rem;
            font-weight: bold;
            color: #7ddf64;
        }
        .prob {
            font-size: 1.3rem;
            font-weight: bold;
            color: #f5d742;
        }
        .total {
            font-size: 0.85rem;
            margin-top: 8px;
            color: #7ddf64;
        }
        .note {
            text-align: center;
            margin-top: 30px;
            color: #888;
            font-size: 0.75rem;
        }
        @media (max-width: 640px) {
            .match-grid { grid-template-columns: 1fr; }
            .stats-row { flex-direction: column; }
            .team-name { font-size: 0.9rem; }
            .odds-num { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏀 NBA прогнозы от DeepSeek AI</h1>
    <div class="sub">Актуальная статистика из интернета + веб-поиск</div>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <a href="/sports-predictor/results.html" style="display: inline-block; padding: 10px 25px; background: #2c6e4f; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; margin: 0 5px;">📊 Результаты прогнозов</a>
        <a href="/sports-predictor/about.html" style="display: inline-block; padding: 10px 25px; background: #1a3a2a; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; margin: 0 5px;">ℹ️ Как это работает</a>
    </div>
    
    <div id="matches" class="match-grid">
        <div style="text-align: center; padding: 50px;">Загрузка...</div>
    </div>
    <div class="note">
        📊 Статистика от DeepSeek AI (веб-поиск)<br>
        🎯 Коэффициенты — средние по всем букмекерам из The Odds API
    </div>
</div>

<script>
    function formatForm(form) {
        if (!form || form === '?') return '?';
        const parts = form.split('-');
        if (parts.length !== 2) return form;
        const wins = parseInt(parts[0]);
        const losses = parseInt(parts[1]);
        let result = '';
        for (let i = 0; i < wins; i++) result += '<span class="win">✓</span>';
        for (let i = 0; i < losses; i++) result += '<span class="loss">✗</span>';
        return result;
    }

    fetch('data/matches.json?t=' + Date.now())
        .then(res => res.json())
        .then(data => {
            const matches = data.matches;
            if (!matches || !matches.length) {
                document.getElementById('matches').innerHTML = '<div style="text-align: center; padding: 50px;">📭 Нет предстоящих матчей</div>';
                return;
            }
            
            let html = '';
            matches.forEach(m => {
                const homeOdds = m.home_odds || (1 / (m.prob / 100)).toFixed(2);
                const awayOdds = m.away_odds || (1 / ((100 - m.prob) / 100)).toFixed(2);
                const homeFormDisplay = formatForm(m.home_form);
                const awayFormDisplay = formatForm(m.away_form);
                
                html += `
                    <div class="match-card">
                        <div class="match-date">📅 ${m.date} ${m.time}</div>
                        
                        <div class="teams">
                            <div class="team">
                                <div class="team-name">${m.home}</div>
                                <div class="team-form">📊 форма: ${homeFormDisplay}</div>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <div class="team-name">${m.away}</div>
                                <div class="team-form">📊 форма: ${awayFormDisplay}</div>
                            </div>
                        </div>
                        
                        <div class="odds-row">
                            <div class="odds-cell">
                                <div class="odds-team">${m.home}</div>
                                <div class="odds-num">${homeOdds}</div>
                            </div>
                            <div class="odds-cell">
                                <div class="odds-team">${m.away}</div>
                                <div class="odds-num">${awayOdds}</div>
                            </div>
                        </div>
                        
                        <div class="bookmakers-info">📊 Коэффициенты усреднены по: ${m.bookmakers_list || 'Данные не загружены'}</div>
                        
                        <div class="stats-row">
                            <div class="stat-block">
                                <div class="stat-label">🏀 Очки за игру (PPG)</div>
                                <div class="stat-value">${m.home_ppg || '?'} | ${m.away_ppg || '?'}</div>
                            </div>
                            <div class="stat-block">
                                <div class="stat-label">🎯 Процент побед (посл.5)</div>
                                <div class="stat-value">${m.home_win_pct || '?'}% | ${m.away_win_pct || '?'}%</div>
                            </div>
                        </div>
                        
                        <div class="ai-thinking">
                            <div class="ai-title">🤖 Мнение DeepSeek AI</div>
                            <div class="ai-text">${m.ai_reasoning || 'Анализ статистики...'}</div>
                        </div>
                        
                        <div class="prediction">
                            <div class="winner">🎯 Прогноз: ${m.winner} победа</div>
                            <div class="prob">Вероятность ${m.prob}%</div>
                            <div class="total">📊 ${m.total_prediction || 'Тотал БОЛЬШЕ 225.5'}</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('matches').innerHTML = html;
        })
        .catch(err => {
            console.error(err);
            document.getElementById('matches').innerHTML = '<div style="text-align: center; padding: 50px;">❌ Ошибка загрузки данных</div>';
        });
</script>
</body>
</html>
