<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Betting Corporation · NBA & NHL Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%);
            color: #eef2ff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid rgba(125, 223, 100, 0.2);
        }
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .brain-icon {
            font-size: 3.5rem;
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 5px rgba(125, 223, 100, 0.5));
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 15px rgba(125, 223, 100, 0.8)); }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .deepseek-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.2), rgba(0, 100, 255, 0.1));
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid rgba(0, 150, 255, 0.4);
            font-weight: 600;
            font-size: 1.1rem;
        }
        .deepseek-logo span:first-child { font-size: 1.5rem; }
        .deepseek-logo .deepseek-text {
            background: linear-gradient(135deg, #4aa3cf, #7ddf64);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #7ddf64, #4aa3cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .sub { color: #9bc4a8; font-size: 0.9rem; letter-spacing: 1px; }
        .min-prob-badge {
            display: inline-block;
            background: rgba(125, 223, 100, 0.15);
            border: 1px solid rgba(125, 223, 100, 0.4);
            border-radius: 40px;
            padding: 5px 15px;
            font-size: 0.8rem;
            margin-top: 12px;
            color: #7ddf64;
        }
        .sport-tabs {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .sport-btn {
            background: rgba(31, 58, 74, 0.5);
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            color: #9bc4a8;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        .sport-btn.active {
            background: linear-gradient(135deg, #2c6e4f, #1d5a41);
            color: white;
            box-shadow: 0 0 20px rgba(45, 110, 79, 0.3);
        }
        .filter-panel {
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 30px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(125, 223, 100, 0.3);
        }
        .refresh-btn {
            background: linear-gradient(135deg, #2c6e4f, #1d5a41);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(45, 110, 79, 0.4);
        }
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(620px, 1fr));
            gap: 24px;
        }
        .match-card {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(125, 223, 100, 0.2);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #7ddf64, #4aa3cf, #7ddf64);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .match-card:hover {
            transform: translateY(-8px);
            border-color: rgba(125, 223, 100, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .match-card:hover::before { opacity: 1; }
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .league-badge {
            background: linear-gradient(135deg, #1f4e3f, #0f3a2a);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .match-date {
            font-size: 0.75rem;
            color: #9bc4a8;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 14px;
            border-radius: 40px;
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            gap: 15px;
        }
        .team { text-align: center; flex: 1; }
        .team-name {
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #9bc4a8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .team-stats {
            font-size: 0.7rem;
            color: #7ddf64;
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .vs {
            background: linear-gradient(135deg, #2c6e4f, #1d5a41);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 700;
        }
        .odds-row {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 48px;
            padding: 12px 20px;
            margin: 15px 0 8px 0;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .odds-cell { flex: 1; }
        .odds-team {
            font-size: 0.7rem;
            color: #9bc4a8;
            margin-bottom: 5px;
        }
        .odds-num {
            font-size: 1.5rem;
            font-weight: 800;
            color: #f5d742;
        }
        .odds-small { font-size: 0.65rem; color: #9bc4a8; }
        .bookmakers-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 0.7rem;
            color: #9bc4a8;
            text-align: center;
        }
        .prediction {
            background: linear-gradient(135deg, rgba(29, 90, 65, 0.3), rgba(10, 47, 34, 0.3));
            border-radius: 24px;
            padding: 16px;
            text-align: center;
            margin: 15px 0;
            border: 1px solid rgba(125, 223, 100, 0.2);
        }
        .winner {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .prob {
            background: rgba(0, 0, 0, 0.4);
            display: inline-block;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #f5d742;
            font-weight: 600;
        }
        .total {
            font-size: 0.85rem;
            margin-top: 10px;
            color: #7ddf64;
            font-weight: 500;
        }
        .ai-reasoning {
            background: linear-gradient(135deg, rgba(100, 100, 200, 0.15), rgba(80, 80, 160, 0.1));
            border-left: 4px solid #7ddf64;
            border-radius: 16px;
            padding: 14px 18px;
            margin: 15px 0;
        }
        .stats-details {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }
        .stats-title {
            font-size: 0.75rem;
            color: #7ddf64;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.6rem;
            color: #9bc4a8;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: #f5d742;
        }
        .h2h-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            margin-bottom: 12px;
        }
        .injury-info {
            background: rgba(227, 76, 38, 0.15);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 12px;
            border-left: 3px solid #e34c26;
        }
        .form-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 12px;
        }
        .form-badge {
            background: rgba(125, 223, 100, 0.1);
            padding: 8px 10px;
            border-radius: 16px;
            margin-bottom: 8px;
        }
        .form-badge:last-child { margin-bottom: 0; }
        .form-record {
            font-size: 0.9rem;
            font-weight: 700;
            color: #f5d742;
        }
        .form-explanation {
            font-size: 0.6rem;
            color: #9bc4a8;
            margin-left: 8px;
        }
        .streak-up { color: #7ddf64; }
        .streak-down { color: #e34c26; }
        .stats-grid-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(29, 90, 65, 0.4), rgba(10, 47, 34, 0.4));
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(125, 223, 100, 0.2);
        }
        .stat-card-title {
            font-size: 0.8rem;
            color: #9bc4a8;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .stat-card-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #f5d742;
        }
        .stat-card-detail {
            font-size: 0.7rem;
            color: #7ddf64;
            margin-top: 8px;
        }
        .stats-table {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            overflow-x: auto;
            border: 1px solid rgba(125, 223, 100, 0.2);
        }
        .stats-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .stats-table th, .stats-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(125, 223, 100, 0.2);
        }
        .stats-table th { color: #7ddf64; font-weight: 600; }
        .success { color: #7ddf64; }
        .failed { color: #e34c26; }
        .loading {
            text-align: center;
            padding: 60px;
            color: #9bc4a8;
        }
        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(125, 223, 100, 0.3);
            border-radius: 50%;
            border-top-color: #7ddf64;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 640px) {
            body { padding: 12px; }
            .filter-panel { flex-direction: column; border-radius: 30px; }
            .match-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
            .team-name { font-size: 0.9rem; }
            .odds-num { font-size: 1.1rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .logo-container { gap: 10px; }
            .deepseek-logo { padding: 4px 12px; font-size: 0.9rem; }
            .brain-icon { font-size: 2.5rem; }
            .sport-tabs { gap: 10px; }
            .sport-btn { padding: 8px 20px; font-size: 0.9rem; }
            .stats-grid-cards { grid-template-columns: 1fr; gap: 15px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-container">
            <div class="brain-icon">🧠</div>
            <div class="deepseek-logo">
                <span>🐋</span>
                <span class="deepseek-text">DeepSeek</span>
                <span style="font-size: 0.8rem; color: #4aa3cf;">V4</span>
            </div>
        </div>
        <h1>AI Betting Corporation</h1>
        <div class="sub">NBA & NHL Predictor · DeepSeek V4 AI</div>
        <div class="min-prob-badge" id="minProbBadge">🎯 Только прогнозы ≥66%</div>
    </div>

    <div class="sport-tabs">
        <button class="sport-btn active" data-sport="nba">🏀 NBA</button>
        <button class="sport-btn" data-sport="nhl">🏒 NHL</button>
    </div>

    <!-- Панель NBA -->
    <div id="nbaPanel">
        <div class="filter-panel">
            <button class="refresh-btn" data-sport="nba">🔄 Обновить прогнозы (NBA)</button>
        </div>
        <div id="nbaMatchesContainer" class="match-grid">
            <div class="loading"><div class="loader"></div><div style="margin-top: 15px;">Загрузка прогнозов NBA...</div></div>
        </div>
    </div>

    <!-- Панель NHL -->
    <div id="nhlPanel" style="display: none;">
        <div class="filter-panel">
            <button class="refresh-btn" data-sport="nhl">🔄 Обновить прогнозы (NHL)</button>
        </div>
        <div id="nhlMatchesContainer" class="match-grid">
            <div class="loading"><div class="loader"></div><div style="margin-top: 15px;">Загрузка прогнозов NHL...</div></div>
        </div>
    </div>
</div>

<script>
    const MIN_PROBABILITY = 66;
    document.getElementById('minProbBadge').innerHTML = `🎯 Только прогнозы ≥${MIN_PROBABILITY}%`;
    
    let nbaMatches = [];
    let nhlMatches = [];

    function getOdds(prob) {
        let dec = (1 / (prob / 100)).toFixed(2);
        let american = prob >= 50 ? `-${Math.round(100 / prob * 100 - 100)}` : `+${Math.round(100 / prob * 100 - 100)}`;
        return { dec, american };
    }

    function formatForm(record) {
        if (!record || record === 'N/A') return 'Нет данных';
        let parts = record.split('-');
        if (parts.length === 2) {
            let wins = parseInt(parts[0]);
            let losses = parseInt(parts[1]);
            let total = wins + losses;
            let percent = Math.round(wins / total * 100);
            return `${record} (${percent}% побед)`;
        }
        return record;
    }

    function parseDate(dateStr) {
        let parts = dateStr.split('.');
        if (parts.length === 3) {
            return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
        }
        return null;
    }

    function isFutureMatch(dateStr) {
        let matchDate = parseDate(dateStr);
        if (!matchDate) return true;
        let today = new Date();
        today.setHours(0, 0, 0, 0);
        return matchDate >= today;
    }

    async function loadNBAMatches() {
        const container = document.getElementById('nbaMatchesContainer');
        container.innerHTML = '<div class="loading"><div class="loader"></div><div style="margin-top: 15px;">Загрузка прогнозов NBA...</div></div>';
        try {
            const response = await fetch('data/nba_matches.json?v=' + Date.now());
            if (!response.ok) throw new Error('Файл не найден');
            const data = await response.json();
            nbaMatches = data.matches || [];
            renderMatches('nba');
        } catch (error) {
            container.innerHTML = `<div class="loading">⚠️ Ошибка загрузки NBA: ${error.message}</div>`;
        }
    }

    async function loadNHLMatches() {
        const container = document.getElementById('nhlMatchesContainer');
        container.innerHTML = '<div class="loading"><div class="loader"></div><div style="margin-top: 15px;">Загрузка прогнозов NHL...</div></div>';
        try {
            const response = await fetch('data/nhl_matches.json?v=' + Date.now());
            if (!response.ok) throw new Error('Файл не найден');
            const data = await response.json();
            nhlMatches = data.matches || [];
            renderMatches('nhl');
        } catch (error) {
            container.innerHTML = `<div class="loading">⚠️ Ошибка загрузки NHL: ${error.message}</div>`;
        }
    }

    function renderMatches(sport) {
        const isNBA = sport === 'nba';
        const matches = isNBA ? nbaMatches : nhlMatches;
        const container = document.getElementById(isNBA ? 'nbaMatchesContainer' : 'nhlMatchesContainer');
        const leagueName = isNBA ? 'NBA' : 'NHL';
        const leagueEmoji = isNBA ? '🏀' : '🏒';
        
        let futureMatches = matches.filter(match => isFutureMatch(match.date));
        if (futureMatches.length === 0) {
            container.innerHTML = `<div class="loading">📭 Нет предстоящих матчей ${leagueName}</div>`;
            return;
        }
        
        futureMatches.sort((a, b) => (b.prob || 55) - (a.prob || 55));
        container.innerHTML = '';
        
        for (let m of futureMatches) {
            const prob = m.prob || 65;
            const winner = m.winner || m.home;
            const odds = getOdds(prob);
            const oppOdds = getOdds(100 - prob);
            const isHome = winner === m.home;
            const totalText = m.total_prediction || (prob > 55 ? 'Тотал БОЛЬШЕ' : 'Тотал МЕНЬШЕ');
            const matchTime = m.time || '04:30 МСК';
            
            const homeForm = formatForm(m.home_form);
            const awayForm = formatForm(m.away_form);
            const homeStreak = m.home_streak || 'N/A';
            const awayStreak = m.away_streak || 'N/A';
            const isHomeStreakUp = homeStreak.startsWith('W');
            const isAwayStreakUp = awayStreak.startsWith('W');
            const h2h = m.h2h || 'нет данных';
            const injuries = m.injuries || '✅ Все игроки в строю';
            const aiReasoning = m.ai_reasoning || 'Нейросеть проанализировала статистику и форму команд.';
            const bookmakersList = m.bookmakers_list || 'Данные загружаются...';
            
            container.innerHTML += `
                <div class="match-card">
                    <div class="match-header">
                        <span class="league-badge">${leagueEmoji} ${leagueName}</span>
                        <span class="match-date">📅 ${m.date} · ${matchTime}</span>
                    </div>
                    <div class="teams">
                        <div class="team">
                            <div class="team-name">${m.home}</div>
                            <div class="team-stats">📊 ${m.home_ppg || 0} ${isNBA ? 'PPG' : 'GPG'} | ${m.home_win_pct || 0}% побед</div>
                        </div>
                        <div class="vs">VS</div>
                        <div class="team">
                            <div class="team-name">${m.away}</div>
                            <div class="team-stats">📊 ${m.away_ppg || 0} ${isNBA ? 'PPG' : 'GPG'} | ${m.away_win_pct || 0}% побед</div>
                        </div>
                    </div>
                    <div class="odds-row">
                        <div class="odds-cell">
                            <div class="odds-team">${m.home}</div>
                            <div class="odds-num">${isHome ? odds.dec : oppOdds.dec}</div>
                            <div class="odds-small">(${isHome ? odds.american : oppOdds.american})</div>
                        </div>
                        <div class="odds-cell">
                            <div class="odds-team">${m.away}</div>
                            <div class="odds-num">${!isHome ? odds.dec : oppOdds.dec}</div>
                            <div class="odds-small">(${!isHome ? odds.american : oppOdds.american})</div>
                        </div>
                    </div>
                    <div class="bookmakers-info">📊 Коэффициенты усреднены по: ${bookmakersList}</div>
                    <div class="prediction">
                        <div class="winner">🎯 ${winner} победа</div>
                        <div><span class="prob">Вероятность ${prob}%</span></div>
                        <div class="total">📊 ${totalText}</div>
                    </div>
                    <div class="ai-reasoning">
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                            <span style="font-size: 1.2rem;">🤖</span>
                            <span style="font-weight: 700; color: #7ddf64;">МНЕНИЕ НЕЙРОСЕТИ (DeepSeek V4)</span>
                        </div>
                        <div style="font-size: 0.9rem; line-height: 1.4; color: #eef2ff; white-space: pre-line;">${aiReasoning}</div>
                    </div>
                    <div class="stats-details">
                        <div class="stats-title">🔥 ДЕТАЛЬНАЯ СТАТИСТИКА</div>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-label">${isNBA ? '🏀 Очки за игру' : '🏒 Голов за игру'}</div>
                                <div class="stat-value">${m.home_ppg || 0} | ${m.away_ppg || 0}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">📈 Процент побед</div>
                                <div class="stat-value">${m.home_win_pct || 0}% | ${m.away_win_pct || 0}%</div>
                            </div>
                        </div>
                        <div class="h2h-info">
                            <div class="stat-label">📊 ИСТОРИЯ ЛИЧНЫХ ВСТРЕЧ (H2H)</div>
                            <div class="stat-value" style="font-size: 1rem;">${h2h}</div>
                        </div>
                        <div class="injury-info">
                            <div class="stat-label">🏥 ТРАВМЫ И СОСТАВЫ</div>
                            <div class="stat-value" style="font-size: 0.8rem;">${injuries}</div>
                        </div>
                        <div class="form-info">
                            <div class="form-badge">
                                <span class="stat-label">📆 ФОРМА ${m.home}</span><br>
                                <span class="form-record">${homeForm}</span>
                                <span class="form-explanation">(победы-поражения в последних 10 матчах)</span><br>
                                <span>Текущая серия: <span class="${isHomeStreakUp ? 'streak-up' : 'streak-down'}">${homeStreak}</span></span>
                            </div>
                            <div class="form-badge">
                                <span class="stat-label">📆 ФОРМА ${m.away}</span><br>
                                <span class="form-record">${awayForm}</span>
                                <span class="form-explanation">(победы-поражения в последних 10 матчах)</span><br>
                                <span>Текущая серия: <span class="${isAwayStreakUp ? 'streak-up' : 'streak-down'}">${awayStreak}</span></span>
                            </div>
                        </div>
                        <div style="font-size: 0.65rem; text-align: center; margin-top: 10px; color: #9bc4a8;">🏟️ Данные: ${m.data_source || 'The Odds API + DeepSeek V4 AI'}</div>
                    </div>
                </div>
            `;
        }
    }

    // Переключение между вкладками
    document.querySelectorAll('.sport-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const sport = btn.dataset.sport;
            document.getElementById('nbaPanel').style.display = sport === 'nba' ? 'block' : 'none';
            document.getElementById('nhlPanel').style.display = sport === 'nhl' ? 'block' : 'none';
            if (sport === 'nba' && nbaMatches.length === 0) loadNBAMatches();
            if (sport === 'nhl' && nhlMatches.length === 0) loadNHLMatches();
        };
    });

    // Кнопки обновления
    document.querySelectorAll('.refresh-btn').forEach(btn => {
        btn.onclick = () => {
            const sport = btn.dataset.sport;
            if (sport === 'nba') loadNBAMatches();
            if (sport === 'nhl') loadNHLMatches();
        };
    });

    // Загружаем NBA по умолчанию
    loadNBAMatches();
</script>
</body>
</html>
