<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA прогнозы | DeepSeek AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a1a;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(550px, 1fr));
            gap: 20px;
        }
        .match-card {
            background: #141428;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2c6e4f;
        }
        .match-date {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .team {
            text-align: center;
            flex: 1;
        }
        .team-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .team-stats {
            font-size: 0.7rem;
            color: #7ddf64;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .vs {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c6e4f;
            margin: 0 10px;
        }
        .odds-row {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 48px;
            padding: 12px 20px;
            margin: 15px 0 8px 0;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .odds-cell { flex: 1; }
        .odds-team {
            font-size: 0.7rem;
            color: #9bc4a8;
            margin-bottom: 5px;
        }
        .odds-num {
            font-size: 1.5rem;
            font-weight: 800;
            color: #f5d742;
        }
        .odds-small { font-size: 0.65rem; color: #9bc4a8; }
        .bookmakers-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 0.7rem;
            color: #9bc4a8;
            text-align: center;
        }
        .stats-row {
            background: #0a0a1a;
            border-radius: 12px;
            padding: 12px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .stat-block {
            flex: 1;
            text-align: center;
        }
        .stat-label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 0.9rem;
            font-weight: bold;
            color: #f5d742;
        }
        .prediction {
            background: linear-gradient(135deg, #1a3a2a, #0a1a0a);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            margin-top: 15px;
        }
        .winner {
            font-size: 1.2rem;
            font-weight: bold;
            color: #7ddf64;
        }
        .prob {
            font-size: 1.3rem;
            font-weight: bold;
            color: #f5d742;
        }
        .total {
            font-size: 0.85rem;
            margin-top: 8px;
            color: #7ddf64;
        }
        .streak-up { color: #7ddf64; }
        .streak-down { color: #e34c26; }
        .note {
            text-align: center;
            margin-top: 30px;
            color: #888;
            font-size: 0.75rem;
        }
        @media (max-width: 640px) {
            .match-grid { grid-template-columns: 1fr; }
            .stats-row { flex-direction: column; }
            .team-name { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏀 NBA прогнозы от DeepSeek AI</h1>
    <div class="sub">Актуальная статистика из интернета + прогноз</div>
    
    <div id="matches" class="match-grid">
        <div style="text-align: center; padding: 50px;">Загрузка...</div>
    </div>
    <div class="note">
        📊 Статистика от DeepSeek AI (веб-поиск)<br>
        🎯 Прогноз основан на актуальной статистике команд
    </div>
</div>

<script>
    function formatStreak(streak) {
        if (!streak || streak === '0') return '⚖️ без серии';
        if (streak > 0 || streak.startsWith('+')) return `🔥 ${Math.abs(parseInt(streak))} побед подряд`;
        return `📉 ${Math.abs(parseInt(streak))} поражений подряд`;
    }

    function getAmericanOdds(prob) {
        if (prob >= 50) {
            return '-' + Math.round(100 / (prob / 100) - 100);
        } else {
            return '+' + Math.round(100 / (prob / 100) - 100);
        }
    }

    function getDecimalOdds(prob) {
        return (1 / (prob / 100)).toFixed(2);
    }

    fetch('data/matches.json?t=' + Date.now())
        .then(res => res.json())
        .then(data => {
            const matches = data.matches;
            if (!matches || !matches.length) {
                document.getElementById('matches').innerHTML = '<div style="text-align: center; padding: 50px;">📭 Нет предстоящих матчей</div>';
                return;
            }
            
            let html = '';
            matches.forEach(m => {
                const isHomeWinner = m.winner === m.home;
                const homeOddsDec = getDecimalOdds(isHomeWinner ? m.prob : 100 - m.prob);
                const awayOddsDec = getDecimalOdds(!isHomeWinner ? m.prob : 100 - m.prob);
                const homeOddsAm = getAmericanOdds(isHomeWinner ? m.prob : 100 - m.prob);
                const awayOddsAm = getAmericanOdds(!isHomeWinner ? m.prob : 100 - m.prob);
                
                const homeStreakNum = parseInt(m.home_streak) || 0;
                const awayStreakNum = parseInt(m.away_streak) || 0;
                
                html += `
                    <div class="match-card">
                        <div class="match-date">📅 ${m.date} ${m.time}</div>
                        
                        <div class="teams">
                            <div class="team">
                                <div class="team-name">${m.home}</div>
                                <div class="team-stats">📊 форма: ${m.home_form || '?'}</div>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <div class="team-name">${m.away}</div>
                                <div class="team-stats">📊 форма: ${m.away_form || '?'}</div>
                            </div>
                        </div>
                        
                        <div class="odds-row">
                            <div class="odds-cell">
                                <div class="odds-team">${m.home}</div>
                                <div class="odds-num">${homeOddsDec}</div>
                                <div class="odds-small">(${homeOddsAm})</div>
                            </div>
                            <div class="odds-cell">
                                <div class="odds-team">${m.away}</div>
                                <div class="odds-num">${awayOddsDec}</div>
                                <div class="odds-small">(${awayOddsAm})</div>
                            </div>
                        </div>
                        
                        <div class="bookmakers-info">📊 Коэффициенты: ${m.bookmakers_list || 'Данные не загружены'}</div>
                        
                        <div class="stats-row">
                            <div class="stat-block">
                                <div class="stat-label">🏀 Очки за игру</div>
                                <div class="stat-value">${m.home_ppg || '?'} | ${m.away_ppg || '?'}</div>
                            </div>
                            <div class="stat-block">
                                <div class="stat-label">🎯 Процент побед</div>
                                <div class="stat-value">${m.home_win_pct || '?'}% | ${m.away_win_pct || '?'}%</div>
                            </div>
                        </div>
                        
                        <div class="stats-row">
                            <div class="stat-block">
                                <div class="stat-label">⚡ Серия</div>
                                <div class="stat-value ${homeStreakNum > 0 ? 'streak-up' : (homeStreakNum < 0 ? 'streak-down' : '')}">${formatStreak(m.home_streak)}</div>
                            </div>
                            <div class="stat-block">
                                <div class="stat-label">⚡ Серия</div>
                                <div class="stat-value ${awayStreakNum > 0 ? 'streak-up' : (awayStreakNum < 0 ? 'streak-down' : '')}">${formatStreak(m.away_streak)}</div>
                            </div>
                        </div>
                        
                        <div class="prediction">
                            <div class="winner">🎯 ${m.winner} победа</div>
                            <div class="prob">Вероятность ${m.prob}%</div>
                            <div class="total">📊 ${m.total_prediction || 'Тотал БОЛЬШЕ 225.5'}</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('matches').innerHTML = html;
        })
        .catch(err => {
            console.error(err);
            document.getElementById('matches').innerHTML = '<div style="text-align: center; padding: 50px;">❌ Ошибка загрузки данных</div>';
        });
</script>
</body>
</html>
