<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Betting Corporation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0a1128, #0a1a2e); color: white; padding: 24px 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 1.8rem; background: linear-gradient(135deg, #fff, #7ddf64); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sub { color: #9bc4a8; margin-top: 8px; margin-bottom: 32px; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 24px; }
        .match-card { background: rgba(13, 30, 35, 0.94); border-radius: 24px; padding: 20px; border: 1px solid rgba(45, 110, 79, 0.3); }
        .teams { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin: 20px 0; }
        .team { flex: 1; text-align: center; }
        .team-name { font-weight: 800; font-size: 1rem; }
        .vs { background: #2c6e4f; padding: 6px 12px; border-radius: 40px; font-size: 0.9rem; font-weight: 700; }
        .prediction { background: linear-gradient(95deg, #1d5a41, #0a2f22); border-radius: 18px; padding: 14px; text-align: center; margin-top: 12px; }
        .winner { font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; }
        .prob { background: rgba(0,0,0,0.4); display: inline-block; padding: 4px 12px; border-radius: 60px; font-size: 0.8rem; color: #f5d742; }
        .badge { background: #1f4e3f; display: inline-block; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; }
        .date-time { font-size: 0.7rem; background: #1f6746; display: inline-block; padding: 4px 12px; border-radius: 30px; float: right; }
        .loading { text-align: center; padding: 60px; color: #9bc4a8; }
        .btn { background: #2c6e4f; border: none; color: white; padding: 8px 20px; border-radius: 40px; cursor: pointer; margin-top: 24px; font-size: 0.9rem; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 32px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>🧠 AI Betting Corporation</h1>
            <div class="sub">Прогнозы на спорт · Автообновление</div>
        </div>
        <button class="btn" id="refreshBtn" style="width: auto;">⟳ Обновить</button>
    </div>
    
    <div id="matchesContainer" class="match-grid">
        <div class="loading">📡 Загрузка прогнозов...</div>
    </div>
</div>

<script>
    async function loadMatches() {
        const container = document.getElementById('matchesContainer');
        container.innerHTML = '<div class="loading">📡 Загрузка прогнозов...</div>';
        
        try {
            const response = await fetch('data/matches.json?v=' + Date.now());
            console.log('Статус:', response.status);
            
            if (!response.ok) throw new Error('Файл не найден');
            
            const data = await response.json();
            console.log('Матчей:', data.matches?.length);
            
            const matches = data.matches || [];
            
            if (matches.length === 0) {
                container.innerHTML = '<div class="loading">📭 Нет актуальных матчей</div>';
                return;
            }
            
            container.innerHTML = '';
            
            for (let match of matches) {
                const prob = match.prob || 65;
                const winner = match.winner || match.home;
                const sportEmoji = {
                    'nba': '🏀', 'nhl': '🏒', 'mlb': '⚾', 'nfl': '🏈', 'mls': '⚽'
                }[match.sport] || '⚽';
                
                container.innerHTML += `
                    <div class="match-card">
                        <div>
                            <span class="badge">${sportEmoji} ${match.league || match.sport?.toUpperCase() || 'Спорт'}</span>
                            <span class="date-time">📅 ${match.date} · ${match.time || '19:00 МСК'}</span>
                        </div>
                        <div class="teams">
                            <div class="team"><div class="team-name">${match.home}</div></div>
                            <div class="vs">VS</div>
                            <div class="team"><div class="team-name">${match.away}</div></div>
                        </div>
                        <div class="prediction">
                            <div class="winner">🎯 ${winner} победа</div>
                            <div><span class="prob">Вероятность ${prob}%</span></div>
                        </div>
                    </div>
                `;
            }
        } catch (error) {
            console.error('Ошибка:', error);
            container.innerHTML = `<div class="loading">⚠️ Ошибка загрузки: ${error.message}<br><br>Проверьте, что файл data/matches.json существует в репозитории</div>`;
        }
    }
    
    document.getElementById('refreshBtn').addEventListener('click', loadMatches);
    loadMatches();
</script>
</body>
</html>
