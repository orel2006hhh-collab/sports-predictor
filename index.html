<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏀 NBA Flashscore | Свежие данные</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a1a;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
        }
        .match-card {
            background: #141428;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2c6e4f;
        }
        .match-date {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 15px;
            border-bottom: 1px solid #2c6e4f;
            padding-bottom: 8px;
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }
        .team {
            text-align: center;
            flex: 1;
        }
        .team-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .team-score {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f5d742;
        }
        .vs {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c6e4f;
        }
        .info-note {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.7rem;
            border-top: 1px solid #2c6e4f;
            padding-top: 15px;
        }
        .status-badge {
            display: inline-block;
            background: #2c6e4f;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.7rem;
            margin-bottom: 10px;
        }
        @media (max-width: 640px) {
            .match-grid { grid-template-columns: 1fr; }
            .team-name { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏀 NBA актуальные данные</h1>
    <div class="sub">Свежие результаты и расписание с Flashscore</div>
    
    <div id="matches" class="match-grid">
        <div style="text-align: center; padding: 50px;">Загрузка...</div>
    </div>
    <div class="info-note">
        📅 Данные обновлены: <span id="updateTime">--</span><br>
        📊 Источник: Flashscore
    </div>
</div>

<script>
    async function loadData() {
        try {
            // Добавляем timestamp, чтобы избежать кэширования
            const response = await fetch('data/matches.json?t=' + Date.now());
            if (!response.ok) throw new Error('Сеть не отвечает');
            
            const data = await response.json();
            const matches = data.matches || [];
            const updateTime = data.updated || new Date().toISOString();
            
            // Форматируем время обновления
            const updateDate = new Date(updateTime);
            document.getElementById('updateTime').innerText = updateDate.toLocaleString();
            
            if (matches.length === 0) {
                document.getElementById('matches').innerHTML = '<div style="text-align: center; padding: 50px;">📭 Нет данных о матчах. Парсер ещё не запускался.</div>';
                return;
            }
            
            let html = '';
            matches.forEach(m => {
                // Проверяем, есть ли счет (если да, то матч завершен)
                const hasScore = m.score && m.score !== 'N/A' && m.score !== '-' && !m.score.includes('?');
                const scoreDisplay = hasScore ? `<div class="team-score">${m.score}</div>` : '<div class="team-score">Скоро</div>';
                const status = hasScore ? 'Завершен' : 'Ожидается';
                
                html += `
                    <div class="match-card">
                        <div class="match-date">
                            <span class="status-badge">${status}</span>
                            ${m.date || 'Дата неизвестна'}
                        </div>
                        <div class="teams">
                            <div class="team">
                                <div class="team-name">${escapeHtml(m.home)}</div>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <div class="team-name">${escapeHtml(m.away)}</div>
                            </div>
                        </div>
                        <div class="teams" style="margin-top: -10px;">
                            <div class="team">${scoreDisplay}</div>
                            <div class="vs"></div>
                            <div class="team">${scoreDisplay}</div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('matches').innerHTML = html;
            
        } catch (error) {
            console.error('Ошибка:', error);
            document.getElementById('matches').innerHTML = `<div style="text-align: center; padding: 50px; color: #e34c26;">❌ Ошибка загрузки данных: ${error.message}</div>`;
        }
    }
    
    // Простая защита от XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    loadData();
</script>
</body>
</html>
