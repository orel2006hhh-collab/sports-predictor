<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏀 NBA Flashscore | Результаты и расписание</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a1a;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
        }
        .match-card {
            background: #141428;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2c6e4f;
        }
        .match-date {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2c6e4f;
        }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }
        .team {
            text-align: center;
            flex: 1;
        }
        .team-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .team-score {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f5d742;
        }
        .vs {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c6e4f;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 10px;
        }
        .status-completed {
            background: #2c6e4f;
            color: white;
        }
        .status-scheduled {
            background: #1a1a3e;
            color: #888;
        }
        .match-time {
            text-align: center;
            font-size: 0.8rem;
            color: #f5d742;
            margin-top: 10px;
        }
        .note {
            text-align: center;
            margin-top: 30px;
            color: #888;
            font-size: 0.75rem;
        }
        @media (max-width: 640px) {
            .match-grid { grid-template-columns: 1fr; }
            .team-name { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏀 NBA результаты и расписание</h1>
    <div class="sub">Актуальные данные с Flashscore</div>
    
    <div id="matches" class="match-grid">
        <div style="text-align: center; padding: 50px;">Загрузка...</div>
    </div>
    <div class="note">
        📅 Данные обновлены: <span id="updateTime">--</span><br>
        📊 Источник: Flashscore
    </div>
</div>

<script>
    async function loadData() {
        try {
            const response = await fetch('data/matches.json?t=' + Date.now());
            if (!response.ok) throw new Error('Сеть не отвечает');
            
            const data = await response.json();
            const matches = data.matches || [];
            const updateTime = data.last_updated || new Date().toISOString();
            
            const updateDate = new Date(updateTime);
            document.getElementById('updateTime').innerText = updateDate.toLocaleString();
            
            if (matches.length === 0) {
                document.getElementById('matches').innerHTML = '<div style="text-align: center; padding: 50px;">📭 Нет данных о матчах</div>';
                return;
            }
            
            let html = '';
            matches.forEach(m => {
                const isCompleted = m.status === 'Завершен' || (m.score && m.score !== '?');
                const scoreDisplay = m.score ? `<div class="team-score">${m.score}</div>` : '';
                const timeDisplay = m.time && !isCompleted ? `<div class="match-time">⏰ ${m.time}</div>` : '';
                const statusClass = isCompleted ? 'status-completed' : 'status-scheduled';
                const statusText = isCompleted ? 'Завершен' : (m.time ? 'Ожидается' : 'Скоро');
                
                html += `
                    <div class="match-card">
                        <div class="match-date">📅 ${m.date || 'Дата неизвестна'}</div>
                        <div class="teams">
                            <div class="team">
                                <div class="team-name">${escapeHtml(m.home)}</div>
                                ${isCompleted ? `<div class="team-score">${m.score ? m.score.split(':')[0] : '?'}</div>` : ''}
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <div class="team-name">${escapeHtml(m.away)}</div>
                                ${isCompleted ? `<div class="team-score">${m.score ? m.score.split(':')[1] : '?'}</div>` : ''}
                            </div>
                        </div>
                        ${timeDisplay}
                        <div class="status ${statusClass}">${statusText}</div>
                    </div>
                `;
            });
            
            document.getElementById('matches').innerHTML = html;
            
        } catch (error) {
            console.error('Ошибка:', error);
            document.getElementById('matches').innerHTML = `<div style="text-align: center; padding: 50px; color: #e34c26;">❌ Ошибка загрузки данных: ${error.message}</div>`;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    loadData();
</script>
</body>
</html>
