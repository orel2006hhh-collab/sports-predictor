<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Betting Corporation · NBA Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #0f0c29 100%);
            color: #eef2ff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid rgba(125, 223, 100, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #7ddf64, #4aa3cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .sub {
            color: #9bc4a8;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .filter-panel {
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 30px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(125, 223, 100, 0.3);
        }

        .refresh-btn {
            background: linear-gradient(135deg, #2c6e4f, #1d5a41);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(45, 110, 79, 0.4);
        }

        .nav-tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .nav-btn {
            background: rgba(31, 58, 74, 0.5);
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            color: #9bc4a8;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #2c6e4f, #1d5a41);
            color: white;
            box-shadow: 0 0 20px rgba(45, 110, 79, 0.3);
        }

        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(620px, 1fr));
            gap: 24px;
        }

        .match-card {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(125, 223, 100, 0.2);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #7ddf64, #4aa3cf, #7ddf64);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .match-card:hover {
            transform: translateY(-8px);
            border-color: rgba(125, 223, 100, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .match-card:hover::before {
            opacity: 1;
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .league-badge {
            background: linear-gradient(135deg, #1f4e3f, #0f3a2a);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .match-date {
            font-size: 0.75rem;
            color: #9bc4a8;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 14px;
            border-radius: 40px;
        }

        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            gap: 15px;
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .team-name {
            font-weight: 800;
            font-size: 1.2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #9bc4a8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .team-stats {
            font-size: 0.7rem;
            color: #7ddf64;
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .vs {
            background: linear-gradient(135deg, #2c6e4f, #1d5a41);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .odds-row {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 48px;
            padding: 12px 20px;
            margin: 15px 0 8px 0;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .odds-cell {
            flex: 1;
        }

        .odds-team {
            font-size: 0.7rem;
            color: #9bc4a8;
            margin-bottom: 5px;
        }

        .odds-num {
            font-size: 1.5rem;
            font-weight: 800;
            color: #f5d742;
        }

        .odds-small {
            font-size: 0.65rem;
            color: #9bc4a8;
        }

        .bookmakers-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 0.7rem;
            color: #9bc4a8;
            text-align: center;
        }

        .prediction {
            background: linear-gradient(135deg, rgba(29, 90, 65, 0.3), rgba(10, 47, 34, 0.3));
            border-radius: 24px;
            padding: 16px;
            text-align: center;
            margin: 15px 0;
            border: 1px solid rgba(125, 223, 100, 0.2);
        }

        .winner {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .prob {
            background: rgba(0, 0, 0, 0.4);
            display: inline-block;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #f5d742;
            font-weight: 600;
        }

        .total {
            font-size: 0.85rem;
            margin-top: 10px;
            color: #7ddf64;
            font-weight: 500;
        }
