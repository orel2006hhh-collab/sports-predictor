<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Betting Corporation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a1128; color: white; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #7ddf64; margin-bottom: 8px; }
        .sub { color: #9bc4a8; margin-bottom: 30px; }
        .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(500px, 1fr)); gap: 20px; }
        .match-card { background: #1a2a3a; border-radius: 16px; padding: 18px; border-left: 4px solid #7ddf64; }
        .teams { display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: bold; margin: 15px 0; }
        .vs { background: #2c6e4f; padding: 4px 12px; border-radius: 20px; }
        .prob { background: #f5d742; color: #000; padding: 3px 10px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .total { background: #1f4e3f; padding: 3px 10px; border-radius: 20px; font-size: 12px; display: inline-block; margin-top: 8px; }
        .odds { background: #0a1a2a; border-radius: 30px; padding: 10px; margin: 12px 0; display: flex; justify-content: space-around; text-align: center; }
        .odds-num { font-size: 1.3rem; font-weight: bold; color: #f5d742; }
        .loading { text-align: center; padding: 50px; color: #aaa; }
        button { background: #2c6e4f; border: none; color: white; padding: 8px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; }
        .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .filter-btn { background: #1f3a4a; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
        .filter-btn.active { background: #2c6e4f; }
        .date-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .date-btn { background: #1f3a4a; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
        .date-btn.active { background: #2c6e4f; }
    </style>
</head>
<body>
<div class="container">
    <h1>🧠 AI Betting Corporation</h1>
    <div class="sub">НХЛ · НБА · MLB · NFL · MLS | Прогнозы 55%+</div>
    
    <div class="date-buttons" id="dateButtons">
        <button class="date-btn active" data-date="today">📅 Сегодня</button>
        <button class="date-btn" data-date="tomorrow">📅 Завтра</button>
        <button class="date-btn" data-date="all">📅 Все даты</button>
    </div>
    
    <div class="filters" id="leagueFilters">
        <button class="filter-btn active" data-league="all">🏆 Все</button>
        <button class="filter-btn" data-league="nhl">🏒 НХЛ</button>
        <button class="filter-btn" data-league="nba">🏀 НБА</button>
        <button class="filter-btn" data-league="mlb">⚾ MLB</button>
        <button class="filter-btn" data-league="nfl">🏈 NFL</button>
        <button class="filter-btn" data-league="mls">⚽ MLS</button>
    </div>
    
    <button id="refreshBtn">🔄 Обновить</button>
    
    <div id="matchesContainer" class="match-grid"><div class="loading">Загрузка...</div></div>
</div>

<script>
    let allMatches = [];
    let currentLeague = "all";
    let currentDate = "today";
    let todayStr = "";
    let tomorrowStr = "";
    
    // ============================================================
    // СЛОВАРИ ДЛЯ ИСПРАВЛЕНИЯ НАЗВАНИЙ КОМАНД
    // ============================================================
    
    // Словарь для исправления названий команд NBA
    const NBA_TEAM_FIXES = {
        'ers': 'Philadelphia 76ers',
        'sixers': 'Philadelphia 76ers',
        '76ers': 'Philadelphia 76ers',
        'lakers': 'Los Angeles Lakers',
        'celtics': 'Boston Celtics',
        'warriors': 'Golden State Warriors',
        'warriors?': 'Golden State Warriors',
        'heat': 'Miami Heat',
        'bulls': 'Chicago Bulls',
        'mavericks': 'Dallas Mavericks',
        'mavs': 'Dallas Mavericks',
        'nuggets': 'Denver Nuggets',
        'suns': 'Phoenix Suns',
        'knicks': 'New York Knicks',
        'bucks': 'Milwaukee Bucks',
        'clippers': 'LA Clippers',
        'trail blazers': 'Portland Trail Blazers',
        'blazers': 'Portland Trail Blazers',
        'kings': 'Sacramento Kings',
        'hawks': 'Atlanta Hawks',
        'hornets': 'Charlotte Hornets',
        'jazz': 'Utah Jazz',
        'rockets': 'Houston Rockets',
        'grizzlies': 'Memphis Grizzlies',
        'pelicans': 'New Orleans Pelicans',
        'spurs': 'San Antonio Spurs',
        'thunder': 'Oklahoma City Thunder',
        'pistons': 'Detroit Pistons',
        'cavaliers': 'Cleveland Cavaliers',
        'magic': 'Orlando Magic',
        'wizards': 'Washington Wizards',
        'pacers': 'Indiana Pacers',
        'raptors': 'Toronto Raptors',
        'timberwolves': 'Minnesota Timberwolves',
        'wolves': 'Minnesota Timberwolves',
    };
    
    // Словарь для исправления названий команд NHL
    const NHL_TEAM_FIXES = {
        'canadiens': 'Montreal Canadiens',
        'sabres': 'Buffalo Sabres',
        'maple leafs': 'Toronto Maple Leafs',
        'leafs': 'Toronto Maple Leafs',
        'lightning': 'Tampa Bay Lightning',
        'penguins': 'Pittsburgh Penguins',
        'bruins': 'Boston Bruins',
        'rangers': 'New York Rangers',
        'islanders': 'New York Islanders',
        'devils': 'New Jersey Devils',
        'flyers': 'Philadelphia Flyers',
        'capitals': 'Washington Capitals',
        'hurricanes': 'Carolina Hurricanes',
        'blue jackets': 'Columbus Blue Jackets',
        'red wings': 'Detroit Red Wings',
        'senators': 'Ottawa Senators',
        'panthers': 'Florida Panthers',
        'blackhawks': 'Chicago Blackhawks',
        'avalanche': 'Colorado Avalanche',
        'stars': 'Dallas Stars',
        'wild': 'Minnesota Wild',
        'predators': 'Nashville Predators',
        'blues': 'St. Louis Blues',
        'jets': 'Winnipeg Jets',
        'ducks': 'Anaheim Ducks',
        'flames': 'Calgary Flames',
        'oilers': 'Edmonton Oilers',
        'kings': 'Los Angeles Kings',
        'sharks': 'San Jose Sharks',
        'canucks': 'Vancouver Canucks',
        'golden knights': 'Vegas Golden Knights',
        'kraken': 'Seattle Kraken',
    };
    
    function fixTeamName(teamName, sport) {
        if (!teamName) return teamName;
        
        const nameLower = teamName.toLowerCase().trim();
        
        if (sport === 'nba') {
            for (const [key, fullName] of Object.entries(NBA_TEAM_FIXES)) {
                if (nameLower === key || nameLower.includes(key)) {
                    return fullName;
                }
            }
        } else if (sport === 'nhl') {
            for (const [key, fullName] of Object.entries(NHL_TEAM_FIXES)) {
                if (nameLower === key || nameLower.includes(key)) {
                    return fullName;
                }
            }
        }
        
        return teamName;
    }
    
    // ============================================================
    // ОСНОВНЫЕ ФУНКЦИИ
    // ============================================================
    
    function getOdds(prob) {
        let dec = (1 / (prob / 100)).toFixed(2);
        let american = prob >= 50 ? `-${Math.round(100 / prob * 100 - 100)}` : `+${Math.round(100 / prob * 100 - 100)}`;
        return { dec, american };
    }
    
    async function loadMatches() {
        const container = document.getElementById('matchesContainer');
        container.innerHTML = '<div class="loading">📡 Загрузка...</div>';
        
        try {
            const response = await fetch('data/matches.json?v=' + Date.now());
            if (!response.ok) throw new Error('Файл не найден');
            
            const data = await response.json();
            allMatches = data.matches || [];
            todayStr = data.dateInfo?.today || new Date().toLocaleDateString('ru-RU');
            tomorrowStr = data.dateInfo?.tomorrow || new Date(Date.now() + 86400000).toLocaleDateString('ru-RU');
            
            renderMatches();
        } catch (error) {
            container.innerHTML = `<div class="loading">⚠️ Ошибка загрузки: ${error.message}</div>`;
        }
    }
    
    function renderMatches() {
        let filtered = allMatches.filter(m => {
            if (currentLeague !== 'all' && m.sport !== currentLeague) return false;
            if ((m.prob || 55) < 55) return false;
            if (currentDate === 'today' && m.date !== todayStr) return false;
            if (currentDate === 'tomorrow' && m.date !== tomorrowStr) return false;
            return true;
        });
        
        const container = document.getElementById('matchesContainer');
        if (filtered.length === 0) {
            container.innerHTML = '<div class="loading">📭 Нет матчей</div>';
            return;
        }
        
        filtered.sort((a, b) => (b.prob || 55) - (a.prob || 55));
        container.innerHTML = '';
        
        for (let m of filtered) {
            // ИСПРАВЛЯЕМ НАЗВАНИЯ КОМАНД
            const homeTeam = fixTeamName(m.home, m.sport);
            const awayTeam = fixTeamName(m.away, m.sport);
            
            const prob = m.prob || 65;
            const winner = m.winner || homeTeam;
            const odds = getOdds(prob);
            const oppOdds = getOdds(100 - prob);
            const isHome = winner === homeTeam;
            const sportEmoji = { nhl:'🏒', nba:'🏀', mlb:'⚾', nfl:'🏈', mls:'⚽' }[m.sport] || '⚽';
            const totalText = m.total_prediction || (prob > 55 ? 'Тотал БОЛЬШЕ' : 'Тотал МЕНЬШЕ');
            
            container.innerHTML += `
                <div class="match-card">
                    <div><strong>${sportEmoji} ${m.league || m.sport?.toUpperCase()}</strong> <span style="float:right">📅 ${m.date} · ${m.time || '19:00 МСК'}</span></div>
                    <div class="teams"><span>${homeTeam}</span><span class="vs">VS</span><span>${awayTeam}</span></div>
                    <div class="odds"><div>${homeTeam}<br><span class="odds-num">${isHome ? odds.dec : oppOdds.dec}</span><br>(${isHome ? odds.american : oppOdds.american})</div><div>${awayTeam}<br><span class="odds-num">${!isHome ? odds.dec : oppOdds.dec}</span><br>(${!isHome ? odds.american : oppOdds.american})</div></div>
                    <div><span class="prob">🎯 ${winner} победа | ${prob}%</span> <span class="total">📊 ${totalText}</span></div>
                </div>
            `;
        }
    }
    
    // ============================================================
    // ОБРАБОТЧИКИ СОБЫТИЙ
    // ============================================================
    
    document.getElementById('refreshBtn').onclick = loadMatches;
    
    document.querySelectorAll('.date-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDate = btn.dataset.date;
            renderMatches();
        };
    });
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentLeague = btn.dataset.league;
            renderMatches();
        };
    });
    
    // ЗАПУСК
    loadMatches();
</script>
</body>
</html>
