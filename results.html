<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика прогнозов | NBA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a1a;
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 30px;
        }
        h1 { margin-bottom: 10px; }
        .sub { color: #888; font-size: 0.9rem; }
        
        .back-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: #2c6e4f;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 0.85rem;
        }
        .back-btn:hover { background: #1d5a41; }
        
        .stats-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #141428;
            border-radius: 20px;
            padding: 25px;
            flex: 1;
            text-align: center;
            border: 1px solid #2c6e4f;
        }
        .stat-card-title {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .stat-card-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #f5d742;
        }
        .stat-card-detail {
            font-size: 0.8rem;
            color: #7ddf64;
            margin-top: 8px;
        }
        
        .chart-container {
            background: #141428;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #2c6e4f;
        }
        .chart-title {
            font-size: 0.9rem;
            color: #7ddf64;
            margin-bottom: 15px;
        }
        .chart-bars {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .chart-bar-item {
            text-align: center;
            width: 120px;
        }
        .bar-label {
            font-size: 0.8rem;
            margin-bottom: 8px;
        }
        .bar {
            height: 150px;
            width: 40px;
            background: #1a1a3e;
            border-radius: 10px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
        .bar-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #7ddf64;
            border-radius: 10px;
            transition: height 0.5s ease;
        }
        .bar-fill.loss {
            background: #e34c26;
        }
        .bar-value {
            margin-top: 8px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        .table-container {
            background: #141428;
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
            border: 1px solid #2c6e4f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2c6e4f;
        }
        th { color: #7ddf64; }
        .success { color: #7ddf64; }
        .failed { color: #e34c26; }
        .loading, .empty { text-align: center; padding: 50px; color: #888; }
        
        @media (max-width: 768px) {
            .stats-cards { flex-direction: column; }
            th, td { font-size: 0.75rem; padding: 8px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 Статистика прогнозов NBA</h1>
        <div class="sub">История угадываний победителя и тотала</div>
        <a href="https://orel2006hhh-collab.github.io/sports-predictor/" class="back-btn">← Вернуться к прогнозам</a>
    </div>
    
    <div id="statsCards" class="stats-cards">
        <div class="stat-card">
            <div class="stat-card-title">🏆 ТОЧНОСТЬ ПРОГНОЗОВ (ПОБЕДА)</div>
            <div class="stat-card-value" id="winnerAccuracy">—</div>
            <div class="stat-card-detail" id="winnerDetails"></div>
        </div>
        <div class="stat-card">
            <div class="stat-card-title">📊 ТОЧНОСТЬ ПРОГНОЗОВ (ТОТАЛ)</div>
            <div class="stat-card-value" id="totalAccuracy">—</div>
            <div class="stat-card-detail" id="totalDetails"></div>
        </div>
    </div>
    
    <div class="chart-container">
        <div class="chart-title">📈 Визуализация точности прогнозов</div>
        <div class="chart-bars">
            <div class="chart-bar-item">
                <div class="bar-label">Победа</div>
                <div class="bar" id="winnerBar">
                    <div class="bar-fill" id="winnerFill" style="height: 0%"></div>
                </div>
                <div class="bar-value" id="winnerPercent">0%</div>
                <div class="bar-label" style="font-size: 0.7rem; color: #888;">угадано</div>
            </div>
            <div class="chart-bar-item">
                <div class="bar-label">Тотал</div>
                <div class="bar" id="totalBar">
                    <div class="bar-fill" id="totalFill" style="height: 0%"></div>
                </div>
                <div class="bar-value" id="totalPercent">0%</div>
                <div class="bar-label" style="font-size: 0.7rem; color: #888;">угадано</div>
            </div>
        </div>
    </div>
    
    <div class="table-container">
        <h3 style="margin-bottom: 15px;">📋 История прогнозов</h3>
        <div id="historyTable">
            <div class="loading">Загрузка...</div>
        </div>
    </div>
</div>

<script>
    async function loadHistory() {
        try {
            const response = await fetch('data/history.json?t=' + Date.now());
            if (!response.ok) throw new Error('Файл не найден');
            const data = await response.json();
            const predictions = data.predictions || [];
            
            if (predictions.length === 0) {
                document.getElementById('historyTable').innerHTML = '<div class="empty">📭 Нет данных о завершённых матчах. Прогнозы появятся после того, как матчи сыграют.</div>';
                document.getElementById('winnerAccuracy').innerText = '—';
                document.getElementById('winnerDetails').innerText = 'Нет данных';
                document.getElementById('totalAccuracy').innerText = '—';
                document.getElementById('totalDetails').innerText = 'Нет данных';
                document.getElementById('winnerPercent').innerText = '0%';
                document.getElementById('totalPercent').innerText = '0%';
                return;
            }
            
            let total = predictions.length;
            let winnerSuccesses = predictions.filter(p => p.result === 'success').length;
            let totalSuccesses = predictions.filter(p => p.total_result === 'success').length;
            
            let winnerPercent = Math.round(winnerSuccesses / total * 100);
            let totalPercent = Math.round(totalSuccesses / total * 100);
            
            document.getElementById('winnerAccuracy').innerText = `${winnerPercent}%`;
            document.getElementById('winnerDetails').innerHTML = `✅ ${winnerSuccesses} / ❌ ${total - winnerSuccesses}`;
            document.getElementById('totalAccuracy').innerText = `${totalPercent}%`;
            document.getElementById('totalDetails').innerHTML = `✅ ${totalSuccesses} / ❌ ${total - totalSuccesses}`;
            document.getElementById('winnerPercent').innerText = `${winnerPercent}%`;
            document.getElementById('totalPercent').innerText = `${totalPercent}%`;
            
            // Анимируем заполнение столбцов
            setTimeout(() => {
                document.getElementById('winnerFill').style.height = `${winnerPercent}%`;
                document.getElementById('totalFill').style.height = `${totalPercent}%`;
            }, 100);
            
            let sorted = [...predictions].sort((a, b) => {
                let aDate = a.date.split('.').reverse().join('-');
                let bDate = b.date.split('.').reverse().join('-');
                return bDate.localeCompare(aDate);
            });
            
            let html = `
                <table>
                    <thead>
                        <tr><th>Дата</th><th>Матч</th><th>Прогноз</th><th>Результат</th><th>Прогноз (тотал)</th><th>Счёт</th><th>Вероятность</th></tr>
                    </thead>
                    <tbody>
            `;
            
            for (let p of sorted) {
                const winnerIcon = p.result === 'success' ? '✅' : '❌';
                const winnerClass = p.result === 'success' ? 'success' : 'failed';
                const winnerText = p.result === 'success' ? 'Угадал' : 'Не угадал';
                
                const totalIcon = p.total_result === 'success' ? '✅' : '❌';
                const totalClass = p.total_result === 'success' ? 'success' : 'failed';
                const totalText = p.total_result === 'success' ? 'Угадал' : 'Не угадал';
                
                html += `<tr><td>${p.date}</td><td>${p.home} — ${p.away}</td><td>${p.prediction}</td><td class="${winnerClass}">${winnerIcon} ${winnerText}</td><td>${p.total_prediction || '—'}</td><td class="${totalClass}">${totalIcon} ${totalText} (${p.actual_total || p.actual_score || '—'})</td><td>${p.prob}%</td></tr>`;
            }
            
            html += `</tbody></table>`;
            document.getElementById('historyTable').innerHTML = html;
            
        } catch (error) {
            console.error(error);
            document.getElementById('historyTable').innerHTML = '<div class="empty">❌ Ошибка загрузки истории</div>';
        }
    }
    
    loadHistory();
</script>
</body>
</html>
